<!DOCTYPE HTML>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESP32 Oscilloscopio</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
  <h2>Oscilloscopio Wi-Fi</h2>

  <div class="dashboard">
    <div>Timebase: <input type="number" id="tb" class="val input-tb"> &micro;s</div>
    <div>VMax: <span id="vmax" class="val">0.0</span> V</div>
    <div>Freq: <span id="freq" class="val">0</span> Hz</div>
  </div>

  <canvas id="oscope" width="800" height="400"></canvas>

  <div class="controls">
    <button id="btnHold" class="btn">Pausa / Play</button>
    <div class="tb-controls">
      <button id="btnTbDown" class="btn tb-btn">- Timebase</button>
      <button id="btnTbUp" class="btn tb-btn">+ Timebase</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
